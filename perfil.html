<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Perfil — Manual de Surtos · INS</title>
<meta name="theme-color" content="#007088">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
  <script>
(function(){
  function add(){
    if(document.body.getAttribute('data-page')!=='perfil')return;
    var main=document.querySelector('.body'); if(!main)return;
    if(document.getElementById('admin-link'))return;
    var a=document.createElement('a');
    a.id='admin-link'; a.href='cms.html';
    a.className='pill carmine';
    a.textContent='Administração — Gestor de Conteúdos';
    a.style.cssText='margin:0 0 10px;display:block;text-align:center';
    main.insertBefore(a, main.firstChild);
  }
  if(document.readyState!=='loading') setTimeout(add,60);
  else document.addEventListener('DOMContentLoaded',function(){setTimeout(add,60);});
})();
</script>
<body data-page="perfil">
<script src="assets/js/content.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
