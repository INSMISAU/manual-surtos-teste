<!doctype html><html lang="pt"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Ficha de Doença — Manual de Surtos · INS</title>
<meta name="theme-color" content="#007088">
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--petrol:#007088;--petrol-d:#00566a;--carmim:#B02040;--ink:#232323;--muted:#7c7c7c;--line:#ececec;--teal-bg:#E3F4EF;--teal-line:#a9e0cd;--teal-ink:#0d6b52;--carmim-bg:#fbe9ee;--carmim-line:#eec6d1;}
*{box-sizing:border-box}
body{margin:0;background:#eef1f2;font-family:'Raleway',system-ui,Arial,sans-serif;color:var(--ink)}
.app{max-width:460px;margin:0 auto;background:#fff;min-height:100vh;box-shadow:0 0 40px rgba(0,0,0,.06)}
.badge-pilot{position:static;z-index:5;background:var(--carmim);color:#fff;font-size:11px;text-align:center;padding:5px;letter-spacing:.2px}
.hdr{background:var(--petrol);color:#fff;padding:12px 16px 14px;border-radius:0 0 16px 16px;position:sticky;top:0;z-index:10;box-shadow:0 2px 10px rgba(0,0,0,.12)}
.hdr-top{display:flex;align-items:center;gap:10px;font-size:13px;opacity:.92}
.backlink{background:rgba(255,255,255,.16);border:none;color:#fff;font:inherit;font-size:13px;display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:20px;cursor:pointer}
.spacer{flex:1}
.page-title{font-size:22px;font-weight:700;margin:8px 0 2px}
.page-sub{font-size:13px;opacity:.9;margin:0}
.body{padding:16px 16px 80px}
.note{background:#fff7e9;border:1px solid #f2dca6;color:#7a5b17;font-size:12.5px;border-radius:10px;padding:9px 12px;margin-bottom:12px;line-height:1.5}
.fullbtn{width:100%;border:1px solid var(--petrol);background:#eef7f8;color:var(--petrol-d);font:inherit;font-size:13.5px;font-weight:700;padding:11px;border-radius:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:18px}
svg.i{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.keys{background:var(--teal-bg);border:1px solid var(--teal-line);border-radius:14px;padding:13px 15px;margin-bottom:18px}
.keys summary{cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px;color:var(--teal-ink);font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.keys summary::-webkit-details-marker{display:none}
.keys .kchev{margin-left:auto;opacity:.7;transition:.2s}
.keys[open] .kchev{transform:rotate(180deg)}
.keys ul{list-style:none;margin:12px 0 2px;padding:0;display:flex;flex-direction:column;gap:10px}
.keys li{display:flex;gap:10px;font-size:13.5px;line-height:1.5;color:#173f34}
.keys .n{flex:none;width:22px;height:22px;border-radius:50%;background:var(--petrol);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px}
.sec-h{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:700;margin:8px 0 12px}
.sec-h.carmim{color:var(--carmim)}
.casebar{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.casebtn{flex:1;min-width:80px;border:1px solid var(--carmim-line);background:#fff;color:#9a3350;font:inherit;font-size:13px;font-weight:600;padding:10px 4px;border-radius:11px;cursor:pointer}
.casebtn.on{background:var(--carmim);color:#fff;border-color:var(--carmim)}
.casebox{border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:8px}
.casefig{line-height:0;background:#faf3ee;min-height:110px;display:flex;align-items:center;justify-content:center}
.casefig svg,.casefig img{display:block;width:100%;height:auto}
.casetxt{padding:13px 15px;font-size:13.5px;line-height:1.65;color:#333}
.casebox .casetxt{border-top:1px solid var(--line)}
.casetag{display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--carmim);background:var(--carmim-bg);padding:3px 9px;border-radius:20px;margin-bottom:8px}
.evonote{font-size:12px;color:#5f5f5f;line-height:1.55;margin:2px 2px 20px}
.evo{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:8px;background:#faf7f4}
.evo svg{display:block;width:100%;height:auto}
.acc{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
.acc>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:11px;padding:13px 14px;font-size:14px;font-weight:600}
.acc>summary::-webkit-details-marker{display:none}
.acc .ic{color:var(--petrol);display:flex}
.acc .chev{margin-left:auto;color:#bbb;transition:.2s}
.acc[open] .chev{transform:rotate(180deg)}
.acc .inner{padding:6px 15px 14px;border-top:1px solid var(--line)}
.mlist{margin:6px 0;padding-left:20px;font-size:13.3px;line-height:1.6;color:#3a3a3a}
.mlist li{margin:5px 0}
.mlist li.sub{list-style:circle;margin-left:14px;color:#555}
.mlist b{color:var(--petrol-d)}
.riskitem{margin:14px 0}
.rbanner{border:1px solid #e7efec;border-radius:10px;overflow:hidden;background:#f7fbfa;margin-bottom:8px}
.rbanner svg{display:block;width:100%;height:auto}
.riskrow{display:flex;gap:12px;align-items:center;margin:12px 0}
.riskrow .ill{flex:none;width:78px;height:70px;background:#f7fbfa;border:1px solid #e7efec;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:5px}
.riskrow .ill svg{width:100%;height:100%;display:block}
.rtext{font-size:13px;line-height:1.55;color:#3a3a3a}
.rtext b,.riskrow .tx b{color:var(--petrol-d)}
.foot{color:var(--muted);font-size:11.5px;text-align:center;margin-top:22px;line-height:1.6}
.home-h{padding:22px 18px 8px}
.home-h h1{font-size:22px;font-weight:800;margin:0 0 4px;color:#fff}
.home-h p{margin:0;font-size:13px;opacity:.92;color:#fff}
.home-list{padding:12px 16px}
.grp-h{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--petrol);margin:16px 4px 8px}
.dcard{display:flex;align-items:center;gap:14px;border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:10px;cursor:pointer;background:#fff}
.dcard:hover{border-color:var(--petrol)}
.dcard .lt{flex:none;width:40px;height:40px;border-radius:11px;background:var(--teal-bg);color:var(--petrol);font-size:18px;font-weight:800;display:flex;align-items:center;justify-content:center}
.dcard .nm{font-size:14.5px;font-weight:700;color:var(--petrol-d)}
.dcard .ar{margin-left:auto;color:var(--petrol)}
.ft-h3{font-size:15px;font-weight:700;color:var(--petrol-d);margin:18px 0 4px;padding-bottom:5px;border-bottom:2px solid var(--teal-line)}
.edlab{display:block;font-size:12px;font-weight:700;color:var(--petrol-d);margin:14px 2px 5px}.edin,.edta{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px;font:inherit;font-size:13px;color:#333}.edta{min-height:70px;resize:vertical;line-height:1.5}.logitem{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px}.logh{font-size:13.5px;font-weight:700;color:var(--petrol-d)}.logm{font-size:12px;color:var(--muted);margin-top:3px}.adminbar{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 6px;justify-content:center}.adminbtn{border:1px solid var(--petrol);background:#fff;color:var(--petrol-d);font:inherit;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:20px;cursor:pointer}.adminbtn.on{background:var(--petrol);color:#fff}.offline{font-size:11.5px;color:var(--teal-ink);display:flex;align-items:center;gap:6px;justify-content:center;margin:4px 0 4px}
  .cover{min-height:100vh;display:flex;flex-direction:column;background:linear-gradient(180deg,#eaf3f5,#fff)}.cover .cimg{width:100%;height:auto;display:block;border-bottom:4px solid var(--carmim)}.cover .cbody{padding:20px 22px 30px;text-align:center}.cover .flag{font-size:11.5px;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;font-weight:700;margin:14px 0 4px}.cover h1{font-size:23px;line-height:1.25;font-weight:800;color:var(--petrol-d);margin:6px 8px 8px}.cover .sub{font-size:13.5px;color:#444;margin:0 8px 14px;line-height:1.5}.cover .org{font-size:13px;font-weight:700;color:var(--petrol);margin:2px}.cover .place{font-size:12.5px;color:var(--muted);margin:2px 0 18px}.cbtn{display:inline-flex;align-items:center;gap:8px;background:var(--carmim);color:#fff;border:none;font:inherit;font-size:15px;font-weight:700;padding:13px 26px;border-radius:26px;cursor:pointer;box-shadow:0 4px 14px rgba(176,32,64,.28)}.subh{font-size:15px;font-weight:700;color:var(--petrol-d);margin:16px 0 6px}.secp{font-size:13.6px;line-height:1.7;color:#343434;margin:9px 0}.mono{font-family:monospace;font-weight:700;color:var(--petrol)}.dcard .lt.sm{font-size:14px}
  .fab{position:fixed;bottom:20px;right:max(16px,calc(50% - 214px));z-index:20;background:var(--petrol);color:#fff;border:none;font:inherit;font-size:13px;font-weight:700;padding:11px 16px;border-radius:24px;box-shadow:0 4px 14px rgba(0,0,0,.22);cursor:pointer;display:inline-flex;align-items:center;gap:7px}
</style></head>
<body><div class="app"><div class="badge-pilot">PILOTO DE DESIGN · Manual Nacional de Surtos (INS/MISAU)</div><div id="app"></div></div>
<script src="ddata.js"></script>
<script src="fiche-assets.js"></script>
<script>
var chev='<span class="chev"><svg class="i" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></span>';
var DETAIL=['Limiar de notificação e surto','Agente infeccioso','Fonte e período de infecção','Protocolo de investigação','Laboratório e amostras'];
var ADMIN=false;
function LS(){try{return window.localStorage}catch(e){return null}}
function ovGet(slug){try{return JSON.parse(LS().getItem('ins_ov_'+slug)||'{}')}catch(e){return {}}}
function applyOv(slug){var base=DISEASES[slug];var o=ovGet(slug);var d=JSON.parse(JSON.stringify(base));if(o.keys)d.keys=o.keys;if(o.cases){for(var i in o.cases){if(d.cases[i]&&o.cases[i]!=null)d.cases[i].body=o.cases[i];}}return d;}
function logGet(){try{return JSON.parse(LS().getItem('ins_log')||'[]')}catch(e){return []}}
function logAdd(e){try{var a=logGet();a.unshift(e);LS().setItem('ins_log',JSON.stringify(a.slice(0,200)))}catch(err){}}
function toggleAdmin(){ADMIN=!ADMIN;try{LS().setItem('ins_admin',ADMIN?'1':'0')}catch(e){}renderStructure();}
function fab(fn){return '<button class="fab" onclick="'+fn+'"><svg class="i" viewBox="0 0 24 24" style="width:17px;height:17px"><path d="M15 18l-6-6 6-6"/></svg> Voltar</button>';}
function boldLabel(t){var m=t.match(/^([^:]{2,46}):\s*(.*)$/);if(m&&m[2])return '<b>'+m[1]+':</b> '+m[2];return t;}
function renderItems(items){if(!items||!items.length)return '';var h='<ul class="mlist">';items.forEach(function(it){h+='<li class="'+(it[0]==1?'sub':'')+'">'+boldLabel(it[1])+'</li>';});return h+'</ul>';}
function renderBlocks(bl){var h='',inl=false;(bl||[]).forEach(function(it){var t=it[0],x=it[1];if(t=='li'){if(!inl){h+='<ul class="mlist">';inl=true;}h+='<li>'+boldLabel(x)+'</li>';}else{if(inl){h+='</ul>';inl=false;}if(t=='h')h+='<h3 class="subh">'+x+'</h3>';else h+='<p class="secp">'+boldLabel(x)+'</p>';}});if(inl)h+='</ul>';return h;}
function secByTitle(d,t){for(var i=0;i<(d.secfull||[]).length;i++)if(d.secfull[i].t===t)return d.secfull[i];return null;}

function renderCover(){
 document.getElementById('app').innerHTML=
 '<div class="cover"><img class="cimg" src="'+COVER+'" alt="Capa do manual">'+
 '<div class="cbody"><div class="flag">República de Moçambique</div>'+
 '<h1>Manual para Detecção e Investigação de Surtos em Moçambique</h1>'+
 '<p class="sub">Orientações práticas para deteção, investigação e resposta a surtos</p>'+
 '<div class="org">Instituto Nacional de Saúde · Ministério da Saúde</div>'+
 '<div class="place">Marracuene · 01 de Maio de 2026</div>'+
 '<button class="cbtn" onclick="renderStructure()">Abrir o manual <svg class="i" viewBox="0 0 24 24" style="width:18px;height:18px"><path d="M9 6l6 6-6 6"/></svg></button>'+
 '</div></div>';
 window.scrollTo(0,0);
}
function renderStructure(){
 var MENU=[['s1','Introdução','1'],['s2','Competências e notificação','2'],['s3','Orientações gerais','3'],['sind','Vigilância Sindrómica · 39 doenças','4'],['s5','Investigação de surtos','5'],['s6','Considerações éticas','6'],['abrev','Glossário e abreviaturas','A']];
 var cards=MENU.map(function(m){var fn=m[0]=='sind'?'renderSindromes()':("renderSection('"+m[0]+"')");
   return '<div class="dcard" onclick="'+fn+'"><div class="lt sm">'+m[2]+'</div><div class="nm">Secção '+ (m[0]=='abrev'?'':m[2]+' · ') +m[1].replace('Secção ','')+'</div><div class="ar"><svg class="i" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></div></div>';}).join('');
 var adm='<div class="adminbar"><button class="adminbtn '+(ADMIN?'on':'')+'" onclick="toggleAdmin()">'+(ADMIN?'Modo administrador: ligado':'Administração (demo)')+'</button>'+(ADMIN?'<button class="adminbtn" onclick="renderLog()">Registo de alterações</button>':'')+'</div><div class="offline"><svg class="i" viewBox="0 0 24 24" style="width:15px;height:15px"><path d="M5 12.5a7 7 0 0 1 14 0M2 9a11 11 0 0 1 20 0M8.5 16a3.5 3.5 0 0 1 7 0M12 20h.01"/></svg> Funciona offline · instalável no telemóvel (PWA)</div>';
 document.getElementById('app').innerHTML=
 '<header class="hdr"><div class="hdr-top"><button class="backlink" onclick="renderCover()"><svg class="i" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg> Capa</button><span>Estrutura do manual</span><span class="spacer"></span></div><h1 class="page-title">Manual de Surtos</h1><p class="page-sub">Estrutura de exploração · escolha uma secção</p></header>'+
 '<main class="body"><div class="home-list">'+cards+'</div>'+adm+'<p class="foot">Instituto Nacional de Saúde · MISAU · piloto de redesenho.</p></main>';
 window.scrollTo(0,0);
}
function renderSection(id){var s=SECTIONS[id];if(!s){renderStructure();return;}
 document.getElementById('app').innerHTML='<header class="hdr"><div class="hdr-top"><button class="backlink" onclick="renderStructure()"><svg class="i" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg> Estrutura</button><span>Manual</span><span class="spacer"></span></div><h1 class="page-title">'+s.title+'</h1><p class="page-sub">Resumo</p></header>'+
 '<main class="body"><div class="note">Resumo da secção — para o detalhe integral do manual, toque em «Ver texto completo».</div><button class="fullbtn" onclick="renderSectionFull(\''+id+'\')"><svg class="i" viewBox="0 0 24 24" style="width:17px;height:17px"><path d="M6 2h8l4 4v16H6z"/><path d="M14 2v4h4M9 13h6M9 17h6"/></svg> Ver texto completo</button>'+renderBlocks(s.resumo||s.blocks)+'<p class="foot">Instituto Nacional de Saúde · MISAU</p></main>'+fab("renderStructure()");
 window.scrollTo(0,0);
}
function renderSectionFull(id){var s=SECTIONS[id];if(!s){renderStructure();return;}
 document.getElementById('app').innerHTML='<header class="hdr"><div class="hdr-top"><button class="backlink" onclick="renderSection(\''+id+'\')"><svg class="i" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg> Resumo</button><span>Texto completo</span><span class="spacer"></span></div><h1 class="page-title">'+s.title+'</h1></header>'+
 '<main class="body"><div class="note">Texto reproduzido <b>integralmente</b> do Manual Nacional (pendente de validação do INS).</div>'+renderBlocks(s.blocks)+'<p class="foot">Instituto Nacional de Saúde · MISAU</p></main>'+fab("renderSection('"+id+"')");
 window.scrollTo(0,0);
}
function renderSindromes(){
 var groups=[],seen={};for(var k in DISEASES){var g=DISEASES[k].grp;if(!seen[g]){seen[g]=[];groups.push(g);}seen[g].push(k);}
 var intro=(SECTIONS.s4&&SECTIONS.s4.blocks&&SECTIONS.s4.blocks.length)?('<div style="margin-bottom:6px">'+renderBlocks(SECTIONS.s4.blocks.slice(0,2))+'</div>'):'';
 var h='<header class="hdr"><div class="hdr-top"><button class="backlink" onclick="renderStructure()"><svg class="i" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg> Estrutura</button><span>Secção 4</span><span class="spacer"></span></div><h1 class="page-title">Vigilância Sindrómica</h1><p class="page-sub">39 fichas de doença · por síndrome</p></header><main class="body">'+intro;
 groups.forEach(function(g){h+='<div class="grp-h">'+g+'</div>';seen[g].forEach(function(k){var d=DISEASES[k];h+='<div class="dcard" onclick="go(\''+k+'\')"><div class="lt">'+d.letter+'</div><div class="nm">'+d.name+'</div><div class="ar"><svg class="i" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></div></div>';});});
 h+='<p class="foot">Não substitui o manual oficial. INS · MISAU</p></main>'+fab("renderStructure()");
 document.getElementById('app').innerHTML=h;window.scrollTo(0,0);
}
function adminEditBtn(slug){return '<button class="fullbtn" style="background:#fff7e9;border-color:#e8c26b;color:#8a5a00" onclick="renderEdit(\''+slug+'\')"><svg class="i" viewBox="0 0 24 24" style="width:16px;height:16px"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg> Editar ficha (admin)</button>';}
function renderDisease(slug){var d=applyOv(slug);window.CUR=d;
 var keys='';(d.keys||[]).forEach(function(t,i){keys+='<li><span class="n">'+(i+1)+'</span><span>'+t+'</span></li>';});
 var keysBlock=keys?('<details class="keys" open><summary><svg class="i" viewBox="0 0 24 24" style="width:18px;height:18px"><path d="M21 2l-2 2m-7.6 7.6a5 5 0 1 1-7 7 5 5 0 0 1 7-7zm0 0L15 8m0 0l3 3 3-3-3-3"/></svg> Pontos-chave <span class="kchev"><svg class="i" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></span></summary><ul>'+keys+'</ul></details>'):'';
 var casesBlock='';if(d.cases&&d.cases.length){var bar='';d.cases.forEach(function(c,i){bar+='<button class="casebtn'+(i===0?' on':'')+'" onclick="setCase(\''+slug+'\','+i+',this)">'+c.label+'</button>';});
  casesBlock='<div class="sec-h carmim"><svg class="i" viewBox="0 0 24 24"><path d="M8 15a6 6 0 0 0 12 0v-3M8 15V9a4 4 0 1 1 8 0v3M8 15H5a2 2 0 0 0 0 4h1"/></svg> Definição de caso</div><div class="casebar">'+bar+'</div><div class="casebox"><div class="casefig" id="casefig"></div><div class="casetxt"><span class="casetag" id="casetag"></span><div id="casebody"></div></div></div>';}
 var evo='';if(d.evolution){evo='<div class="sec-h"><svg class="i" viewBox="0 0 24 24"><path d="M3 12h4l3 8 4-16 3 8h4"/></svg> Evolução das lesões</div><div class="evo">'+d.evolution+'</div><p class="evonote">A lesão evolui em fases — mácula, pápula, vesícula, pústula e crosta.</p>';}
 var risksBlock='';if(d.risks&&d.risks.length){var rr='';d.risks.forEach(function(r){if(r.wide){rr+='<div class="riskitem"><div class="rbanner">'+r.media+'</div><div class="rtext"><b>'+r.title+':</b> '+r.text+'</div></div>';}else{rr+='<div class="riskrow"><div class="ill">'+r.media+'</div><div class="tx"><b>'+r.title+':</b> '+r.text+'</div></div>';}});risksBlock='<div class="sec-h"><svg class="i" viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M3 21c0-3.3 2.7-5.5 6-5.5M16 11l2 2 4-4"/></svg> Grupos de risco</div>'+rr;}else{var gs=secByTitle(d,'Grupos de risco');if(gs)risksBlock='<div class="sec-h"><svg class="i" viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M3 21c0-3.3 2.7-5.5 6-5.5M16 11l2 2 4-4"/></svg> Grupos de risco</div><div class="acc" style="padding:2px 4px">'+renderItems(gs.items)+'</div>';}
 var secs='';DETAIL.forEach(function(t){var s=secByTitle(d,t);if(!s)return;var ic=ICONS[t]||'';secs+='<details class="acc"><summary><span class="ic"><svg class="i" viewBox="0 0 24 24">'+ic+'</svg></span>'+t+chev+'</summary><div class="inner">'+renderItems(s.items)+'</div></details>';});
